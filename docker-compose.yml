services:
  db:
    image: postgres:16
    container_name: j-support-db
    env_file:
      - .env
    ports:
      - "5438:${POSTGRES_PORT}"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate:v4.19.1
    container_name: j-support-migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    env_file:
      - .env
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable",
        "up"
      ]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: j-support-app
    env_file:
      - .env
    ports:
      - "8080:${SERVER_PORT}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
