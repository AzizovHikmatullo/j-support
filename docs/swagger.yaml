basePath: /
definitions:
  activity_log.ActivityLog:
    properties:
      action:
        type: string
      actor_id:
        type: integer
      actor_type:
        type: string
      created_at:
        type: string
      id:
        type: integer
      payload:
        $ref: '#/definitions/activity_log.Payload'
      ticket_id:
        type: string
    type: object
  activity_log.Payload:
    additionalProperties: {}
    type: object
  categories.Category:
    properties:
      created_at:
        type: string
      destination:
        type: string
      enabled:
        type: boolean
      id:
        type: integer
      name:
        type: string
    type: object
  categories.CreateCategoryRequest:
    properties:
      destination:
        type: string
      name:
        type: string
    type: object
  categories.UpdateCategoryRequest:
    properties:
      enabled:
        type: boolean
      name:
        type: string
    type: object
  channel.InitTelegramRequest:
    properties:
      name:
        type: string
      phone:
        type: string
      telegram_id:
        type: string
    required:
    - name
    - phone
    - telegram_id
    type: object
  channel.InitWebRequest:
    properties:
      name:
        type: string
      phone:
        type: string
    required:
    - name
    - phone
    type: object
  scenario.CreateScenarioRequest:
    properties:
      category_id:
        type: integer
    required:
    - category_id
    type: object
  scenario.CreateStepRequest:
    properties:
      condition:
        type: string
      parent_id:
        type: integer
      question:
        type: string
    required:
    - question
    type: object
  scenario.Scenario:
    properties:
      category_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      steps:
        items:
          $ref: '#/definitions/scenario.StepNode'
        type: array
    type: object
  scenario.Step:
    properties:
      condition:
        type: string
      created_at:
        type: string
      id:
        type: integer
      parent_id:
        type: integer
      question:
        type: string
      scenario_id:
        type: integer
    type: object
  scenario.StepNode:
    properties:
      children:
        items:
          $ref: '#/definitions/scenario.StepNode'
        type: array
      condition:
        type: string
      created_at:
        type: string
      id:
        type: integer
      parent_id:
        type: integer
      question:
        type: string
      scenario_id:
        type: integer
    type: object
  scenario.UpdateScenarioRequest:
    properties:
      is_active:
        type: boolean
    type: object
  scenario.UpdateStepRequest:
    properties:
      condition:
        type: string
      question:
        type: string
    type: object
  tickets.ChangeAssignedRequest:
    properties:
      assigned_to:
        type: integer
    required:
    - assigned_to
    type: object
  tickets.ChangeStatusRequest:
    properties:
      status:
        type: string
    required:
    - status
    type: object
  tickets.CreateMessageRequest:
    properties:
      content:
        maxLength: 150
        minLength: 1
        type: string
    required:
    - content
    type: object
  tickets.CreateRatingRequest:
    properties:
      reason:
        type: string
      score:
        type: integer
    required:
    - score
    type: object
  tickets.CreateTicketRequest:
    properties:
      category_id:
        type: integer
    required:
    - category_id
    type: object
  tickets.CreateTicketResponse:
    properties:
      assigned_to:
        type: integer
      category_id:
        type: integer
      created_at:
        type: string
      creator_id:
        type: integer
      first_message:
        $ref: '#/definitions/tickets.MessageWithButtons'
      id:
        type: string
      source:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  tickets.Message:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      sender_id:
        type: integer
      sender_type:
        type: string
      ticket_id:
        type: string
    type: object
  tickets.MessageWithButtons:
    properties:
